
<div id="erd" style="overflow-x:auto"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CEECF6' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#7F77DD',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#3C3489' : '#EEEDFE',
  },
});
const diagram = `erDiagram
  auth_users {
    uuid id PK
    string email
    timestamp created_at
  }
  profiles {
    uuid id PK "FK auth.users"
    string full_name
    string phone
    string avatar_url
    string email
    string username "UNIQUE"
    string address_street
    string address_city
    string address_postcode
    string address_country
    timestamp created_at
    timestamp updated_at
  }
  products {
    text id PK
    text name
    text tagline
    text description
    text short_description
    decimal price
    decimal old_price
    text category "TEXT (bukan FK)"
    text collection
    text image_url
    text badge "bestseller|novo|vegano|kit|new"
    int units_sold "TAMBAHAN dari kode"
    jsonb color_variants
    jsonb additional_images
    jsonb key_highlights
    text size_guide "TAMBAHAN"
    text care_instructions "TAMBAHAN"
    decimal rating
    int reviews_count
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }
  kits {
    text id PK
    text name
    text description
    text long_description
    decimal price
    decimal old_price
    text image_url
    text badge "kit|protocol"
    jsonb content
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }
  kit_items {
    uuid id PK
    text kit_id FK
    text product_id FK
    timestamp created_at
  }
  inventory {
    uuid id PK
    text product_id FK "UNIQUE"
    int stock_quantity
    int reserved_quantity
    int low_stock_threshold
    int reorder_point
    timestamp created_at
    timestamp updated_at
  }
  inventory_movements {
    uuid id PK
    text product_id FK
    text movement_type
    int quantity_change
    int quantity_before
    int quantity_after
    text reference_id
    text reason
    uuid created_by FK
    timestamp created_at
  }
  inventory_reservations {
    uuid id PK
    text product_id FK
    int quantity
    text payment_order_id
    text status "active|completed|cancelled|expired"
    timestamp expires_at
    text customer_email
    uuid user_id FK
    timestamp created_at
    timestamp completed_at
  }
  orders {
    text id PK
    uuid user_id FK "nullable: guest"
    text customer_email
    text customer_name
    text customer_phone
    text customer_nik "TAMBAHAN (bukan CPF)"
    text status "pending|paid|shipped|delivered|cancelled"
    decimal total_amount
    decimal shipping_amount
    decimal discount_amount
    text coupon_code "TAMBAHAN"
    text payment_method
    text payment_gateway_id "alias: payment_order_id"
    text shipping_service_id
    text shipping_service_name "TAMBAHAN"
    text tracking_code
    text tracking_url
    text tracking_carrier
    timestamp shipped_at
    text shipping_zip "GANTI: bukan cep"
    text shipping_street
    text shipping_number
    text shipping_complement
    text shipping_neighborhood
    text shipping_city
    text shipping_state
    timestamp created_at
    timestamp updated_at
  }
  order_items {
    uuid id PK
    text order_id FK
    text product_id FK
    text product_name
    text product_image
    int quantity
    decimal price
    text selected_color "TAMBAHAN"
    timestamp created_at
  }
  payment_transactions {
    uuid id PK
    text order_id FK
    text midtrans_transaction_id
    text payment_type
    decimal gross_amount
    text transaction_status
    text fraud_status
    jsonb raw_webhook_payload
    timestamp created_at
    timestamp updated_at
  }
  shipments {
    uuid id PK
    text order_id FK
    text logistics_provider
    text logistics_order_id
    text courier_company
    text courier_type
    text tracking_number
    text status
    decimal shipping_cost
    jsonb raw_webhook_payload
    timestamp created_at
    timestamp updated_at
  }
  reviews {
    uuid id PK
    text product_id FK
    uuid user_id FK "nullable"
    text author_name
    text author_email
    int rating "1-5"
    text text
    text image_url
    text status "pending|approved|rejected"
    timestamp created_at
  }
  waitlist {
    uuid id PK
    text product_id FK
    uuid user_id FK "TAMBAHAN"
    text email
    timestamp notified_at
    timestamp created_at
  }
  wishlists {
    uuid id PK
    uuid user_id FK
    text product_id FK
    timestamp created_at
  }
  loyalty_points {
    uuid id PK
    uuid user_id FK "UNIQUE"
    int points
    text tier "Bronze|Silver|Gold|Platinum"
    timestamp created_at
    timestamp updated_at
  }
  loyalty_history {
    uuid id PK
    uuid user_id FK
    int points_change
    text reason
    text reference_id "TAMBAHAN: link ke order_id"
    timestamp created_at
  }
  user_addresses {
    uuid id PK
    uuid user_id FK
    text label
    text recipient_name
    text phone_number
    text street
    text number
    text complement
    text neighborhood
    text city
    text province
    text zip_code
    boolean is_default
    timestamp created_at
    timestamp updated_at
  }
  cms_pages {
    uuid id PK
    text slug "UNIQUE"
    text title
    text seo_title
    text seo_description
    jsonb blocks
    boolean is_published
    uuid updated_by FK
    timestamp created_at
    timestamp updated_at
  }
  cms_page_versions {
    uuid id PK
    uuid page_id FK
    text title
    text seo_title
    text seo_description
    jsonb blocks
    boolean is_published
    uuid edited_by FK
    timestamp created_at
  }
  site_settings {
    text id PK "DEFAULT: current"
    text store_name
    jsonb marquee_text
    decimal free_shipping_threshold
    text primary_promo_code
    jsonb categories "TEXT[] tidak perlu FK"
    jsonb collections
    jsonb brand_stats
    jsonb contact_info
    jsonb social_links
    jsonb hero_slides
    jsonb homepage_banners
    jsonb product_detail_settings
    jsonb navigation
    timestamp updated_at
  }
  promo_codes {
    text id PK
    text description
    text discount_type "percentage|fixed"
    decimal discount_value
    decimal min_purchase_amount
    decimal max_discount_amount
    timestamp expires_at
    int usage_limit
    int usage_count
    boolean is_active
    timestamp created_at
  }
  flash_sales {
    uuid id PK
    text name
    text description
    timestamp start_date
    timestamp end_date
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }
  flash_sale_products {
    uuid id PK
    uuid flash_sale_id FK
    text product_id FK
    decimal sale_price
    timestamp created_at
  }
  vip_list {
    uuid id PK
    uuid user_id FK "nullable"
    text email "UNIQUE"
    text full_name
    text phone
    text source
    timestamp created_at
  }
  email_sequences {
    uuid id PK
    text order_id FK
    text customer_email
    text customer_name
    text sequence_type "d3_check_in|d7_reorder"
    jsonb product_names
    jsonb product_ids
    text status "pending|sent|failed"
    text error_message
    timestamp send_at
    timestamp sent_at
    timestamp created_at
    timestamp updated_at
  }
  checkout_abandons {
    uuid id PK
    text email
    text phone
    jsonb cart_items
    text status "pending|converted|sent|failed"
    text error_message
    timestamp captured_at
    timestamp send_at
    timestamp sent_at
    timestamp created_at
    timestamp updated_at
  }

  auth_users ||--o| profiles : "1:1"
  auth_users ||--o| loyalty_points : "1:1"
  auth_users ||--o{ loyalty_history : "1:N"
  auth_users ||--o{ orders : "1:N"
  auth_users ||--o{ reviews : "1:N"
  auth_users ||--o{ waitlist : "1:N"
  auth_users ||--o{ user_addresses : "1:N"
  auth_users ||--o{ wishlists : "1:N"

  products ||--o| inventory : "1:1"
  products ||--o{ inventory_movements : "1:N"
  products ||--o{ inventory_reservations : "1:N"
  products ||--o{ order_items : "1:N"
  products ||--o{ reviews : "1:N"
  products ||--o{ waitlist : "1:N"
  products ||--o{ wishlists : "1:N"
  products ||--o{ flash_sale_products : "1:N"
  products ||--o{ kit_items : "1:N"

  kits ||--o{ kit_items : "1:N"
  orders ||--o{ order_items : "1:N"
  orders ||--o{ payment_transactions : "1:N"
  orders ||--o{ shipments : "1:N"
  orders ||--o{ email_sequences : "1:N"

  flash_sales ||--o{ flash_sale_products : "1:N"
  cms_pages ||--o{ cms_page_versions : "1:N"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
